name: release-package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install --yes zip

      - name: Build package
        run: ./scripts/build-package.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Millennialism.zip
